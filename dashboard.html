<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Presensi Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; min-height: 100vh; }
        .topbar { background: #fff; padding: 0 32px; height: 72px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 0 #e2e8f0; position: sticky; top: 0; z-index: 50; }
        .btn-back { display: flex; align-items: center; gap: 6px; background: none; border: 1.5px solid #e2e8f0; border-radius: 50px; padding: 8px 16px; font-size: 13px; font-weight: 600; color: #475569; cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .btn-back:hover { border-color: #0D1B6E; color: #0D1B6E; }
        .profile-chip { display: flex; align-items: center; gap: 10px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 50px; padding: 6px 16px 6px 6px; }
        .profile-avatar { width: 38px; height: 38px; border-radius: 50%; background: #0D1B6E; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 15px; }
        .profile-name { font-size: 13px; font-weight: 700; color: #1e293b; }
        .profile-role { font-size: 11px; color: #64748b; font-weight: 500; }
        .main { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
        .greeting { text-align: center; margin-bottom: 40px; }
        .greeting h2 { font-size: 32px; font-weight: 800; color: #0D1B6E; margin-bottom: 6px; }
        .greeting p { font-size: 14px; color: #64748b; font-weight: 500; }
        .card { background: #fff; border-radius: 20px; padding: 28px 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .card-header { display: flex; align-items: center; gap: 16px; padding-bottom: 20px; border-bottom: 1px solid #f1f5f9; margin-bottom: 28px; }
        .card-icon { width: 48px; height: 48px; border-radius: 14px; background: #eef2ff; display: flex; align-items: center; justify-content: center; color: #0D1B6E; flex-shrink: 0; }
        .card-title { font-size: 17px; font-weight: 700; color: #1e293b; }
        .card-desc { font-size: 13px; color: #64748b; margin-top: 2px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 13px; font-weight: 700; color: #374151; }
        .select-wrap { position: relative; }
        .select-wrap svg.icon-left { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none; }
        .select-wrap svg.chevron { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none; }
        select { width: 100%; padding: 13px 16px 13px 44px; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 14px; font-family: inherit; font-weight: 500; color: #1e293b; background: #f8fafc; outline: none; appearance: none; cursor: pointer; transition: all 0.2s; }
        select:focus { border-color: #0D1B6E; background: #fff; box-shadow: 0 0 0 3px rgba(13,27,110,0.08); }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-full { margin-bottom: 20px; }
        .btn-primary { width: 100%; padding: 16px; background: #0D1B6E; color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; }
        .btn-primary:hover { background: #1a2d9e; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(13,27,110,0.25); }
        .nav-card { background: #0D1B6E; border-radius: 20px; padding: 24px 28px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s; margin-bottom: 20px; border: none; width: 100%; text-align: left; }
        .nav-card:hover { background: #1a2d9e; transform: translateY(-2px); box-shadow: 0 12px 32px rgba(13,27,110,0.3); }
        .nav-card.secondary { background: #f8fafc; border: 1.5px solid #e2e8f0; }
        .nav-card.secondary:hover { background: #eef2ff; border-color: #0D1B6E; box-shadow: 0 4px 16px rgba(13,27,110,0.1); transform: translateY(-1px); }
        .nav-card-left { display: flex; align-items: center; gap: 16px; }
        .nav-card-icon { width: 48px; height: 48px; background: rgba(255,255,255,0.15); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .nav-card.secondary .nav-card-icon { background: #eef2ff; }
        .nav-card-title { font-size: 16px; font-weight: 700; color: #fff; }
        .nav-card.secondary .nav-card-title { color: #1e293b; }
        .nav-card-desc { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; }
        .nav-card.secondary .nav-card-desc { color: #64748b; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .btn-logout { display: block; width: fit-content; margin: 24px auto 0; background: none; border: 1.5px solid #e2e8f0; border-radius: 50px; padding: 10px 24px; font-size: 13px; font-weight: 600; color: #94a3b8; cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .btn-logout:hover { border-color: #fca5a5; color: #ef4444; background: #fff5f5; }
        .footer-text { text-align: center; font-size: 11px; color: #cbd5e1; margin-top: 12px; font-weight: 500; }
        @media (max-width: 600px) { .topbar { padding: 0 16px; } .main { padding: 24px 16px; } .form-row { grid-template-columns: 1fr; } .card { padding: 20px; } .greeting h2 { font-size: 24px; } .nav-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="topbar">
        <button class="btn-back" onclick="logout()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Keluar
        </button>
        <div class="profile-chip">
            <div class="profile-avatar" id="avatarCircle">G</div>
            <div>
                <div class="profile-name" id="namaGuruTop">Guru</div>
                <div class="profile-role" id="roleTop">-</div>
            </div>
            <svg width="14" height="14" fill="none" stroke="#94a3b8" stroke-width="2.5" viewBox="0 0 24 24" style="margin-left:6px"><path d="M6 9l6 6 6-6"/></svg>
        </div>
    </div>

    <div class="main">
        <div class="greeting">
            <h2>Halo, <span id="sapaGuru">Guru</span> 👋</h2>
            <p id="subtitleGreeting">Kelola absensi siswa dengan mudah dan cepat</p>
        </div>

        <!-- ========== AREA GURU ========== -->
        <div id="areaGuru" style="display:none">
            <!-- Absensi -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    </div>
                    <div>
                        <div class="card-title">Pencatatan Absensi</div>
                        <div class="card-desc">Pilih kelas dan mata pelajaran untuk memulai absensi</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Pilih Kelas</label>
                        <div class="select-wrap">
                            <svg class="icon-left" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
                            <select id="pilihKelas" onchange="onKelasChange()">
                                <option value="">-- Pilih Kelas --</option>
                            </select>
                            <svg class="chevron" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Pilih Mata Pelajaran</label>
                        <div class="select-wrap">
                            <svg class="icon-left" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                            <select id="pilihMapel" disabled>
                                <option value="">-- Pilih Kelas Dulu --</option>
                            </select>
                            <svg class="chevron" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
                        </div>
                    </div>
                </div>
                <button class="btn-primary" onclick="mulaiAbsen()">Mulai Absensi</button>
            </div>

            <!-- Menu bawah Guru: Riwayat + Cetak Laporan -->
            <div class="nav-grid">
                <button class="nav-card" onclick="window.location.href='riwayat.html'">
                    <div class="nav-card-left">
                        <div class="nav-card-icon">
                            <svg width="22" height="22" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                        </div>
                        <div>
                            <div class="nav-card-title">Riwayat Siswa</div>
                            <div class="nav-card-desc">Log absen harian</div>
                        </div>
                    </div>
                    <svg width="18" height="18" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                </button>
                <button class="nav-card secondary" onclick="window.location.href='laporan.html'">
                    <div class="nav-card-left">
                        <div class="nav-card-icon">
                            <svg width="22" height="22" fill="none" stroke="#0D1B6E" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                        </div>
                        <div>
                            <div class="nav-card-title">Cetak Laporan</div>
                            <div class="nav-card-desc">Rekap kehadiran</div>
                        </div>
                    </div>
                    <svg width="18" height="18" fill="none" stroke="#94a3b8" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>
        </div>

        <!-- ========== AREA ADMIN ========== -->
        <div id="areaAdmin" style="display:none">
            <div class="nav-grid">
                <button class="nav-card" onclick="window.location.href='riwayat.html'">
                    <div class="nav-card-left">
                        <div class="nav-card-icon">
                            <svg width="22" height="22" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                        </div>
                        <div>
                            <div class="nav-card-title">Riwayat Siswa</div>
                            <div class="nav-card-desc">Log absen harian</div>
                        </div>
                    </div>
                    <svg width="18" height="18" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                </button>
                <button class="nav-card secondary" onclick="window.location.href='laporan.html'">
                    <div class="nav-card-left">
                        <div class="nav-card-icon">
                            <svg width="22" height="22" fill="none" stroke="#0D1B6E" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                        </div>
                        <div>
                            <div class="nav-card-title">Cetak Laporan</div>
                            <div class="nav-card-desc">Semua kelas & mapel</div>
                        </div>
                    </div>
                    <svg width="18" height="18" fill="none" stroke="#94a3b8" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>
        </div>

        <button class="btn-logout" onclick="logout()">🚪 Keluar dari Aplikasi</button>
        <p class="footer-text">SIAKAD Hadir v2.0 • SMPN 1 Tinambung</p>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyge3Is9gm24r_5nbXnkRlPEyJfOE42SkF1zPVjZTBOETVkotYsHAerjKigcUXJ0OM/exec";
        const namaUser = localStorage.getItem('namaGuru') || 'Guru';
        const roleUser = (localStorage.getItem('role') || 'Guru').toLowerCase();

        document.getElementById('namaGuruTop').innerText = namaUser;
        document.getElementById('roleTop').innerText = roleUser === 'admin' ? 'Administrator' : 'Guru Pengajar';
        document.getElementById('avatarCircle').innerText = namaUser.charAt(0).toUpperCase();
        document.getElementById('sapaGuru').innerText = (roleUser === 'admin' ? '' : 'Guru ') + namaUser.split(' ')[0];
        document.getElementById('subtitleGreeting').innerText = roleUser === 'admin'
            ? 'Selamat datang, Admin. Kelola & cetak data absensi sekolah.'
            : 'Kelola absensi dan cetak laporan dengan mudah';

        let dataGuruMapel = [];

        if (roleUser === 'admin') {
            document.getElementById('areaAdmin').style.display = 'block';
        } else {
            document.getElementById('areaGuru').style.display = 'block';
            muatDataGuruMapel();
        }

        async function muatDataGuruMapel() {
            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getMapelGuru', namaGuru: namaUser })
                });
                dataGuruMapel = await res.json();
                const kelasUnik = [...new Set(dataGuruMapel.map(d => d.kelas))];
                const selKelas = document.getElementById('pilihKelas');
                selKelas.innerHTML = '<option value="">-- Pilih Kelas --</option>';
                kelasUnik.forEach(k => {
                    selKelas.innerHTML += `<option value="${k}">${k}</option>`;
                });
            } catch(e) {
                console.error('Gagal muat data guru mapel', e);
            }
        }

        function onKelasChange() {
            const kelas = document.getElementById('pilihKelas').value;
            const selMapel = document.getElementById('pilihMapel');
            if (!kelas) {
                selMapel.innerHTML = '<option value="">-- Pilih Kelas Dulu --</option>';
                selMapel.disabled = true;
                return;
            }
            const mapelList = dataGuruMapel.filter(d => d.kelas === kelas).map(d => d.mapel);
            selMapel.innerHTML = '<option value="">-- Pilih Mata Pelajaran --</option>';
            mapelList.forEach(m => { selMapel.innerHTML += `<option value="${m}">${m}</option>`; });
            selMapel.disabled = false;
        }

        function mulaiAbsen() {
            const kls = document.getElementById('pilihKelas').value;
            const mapel = document.getElementById('pilihMapel').value;
            if (!kls) return alert('Pilih kelas terlebih dahulu!');
            if (!mapel) return alert('Pilih mata pelajaran terlebih dahulu!');
            localStorage.setItem('kelasAktif', kls);
            localStorage.setItem('mapelAktif', mapel);
            window.location.href = 'absensi.html';
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
