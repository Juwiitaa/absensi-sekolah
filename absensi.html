<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Absensi - Presensi Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; min-height: 100vh; padding-bottom: 100px; }

        /* TOPBAR */
        .topbar {
            background: #fff; padding: 0 32px; height: 72px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 1px 0 #e2e8f0; position: sticky; top: 0; z-index: 50;
        }
        .btn-back {
            display: flex; align-items: center; gap: 6px;
            background: none; border: 1.5px solid #e2e8f0; border-radius: 50px;
            padding: 8px 16px; font-size: 13px; font-weight: 600; color: #475569;
            cursor: pointer; font-family: inherit; transition: all 0.2s;
        }
        .btn-back:hover { border-color: #0D1B6E; color: #0D1B6E; }
        .profile-chip {
            display: flex; align-items: center; gap: 10px;
            background: #f8fafc; border: 1.5px solid #e2e8f0;
            border-radius: 50px; padding: 6px 16px 6px 6px;
        }
        .profile-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: #0D1B6E; display: flex; align-items: center;
            justify-content: center; color: #fff; font-weight: 700; font-size: 15px;
        }
        .profile-name { font-size: 13px; font-weight: 700; color: #1e293b; }
        .profile-role { font-size: 11px; color: #64748b; font-weight: 500; }

        /* INFO BAR */
        .info-bar {
            background: #0D1B6E; padding: 16px 32px;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
        }
        .info-chips { display: flex; gap: 12px; flex-wrap: wrap; }
        .info-chip {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px; padding: 8px 16px;
        }
        .info-chip-label { font-size: 10px; color: rgba(255,255,255,0.6); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-chip-value { font-size: 13px; font-weight: 700; color: #fff; }
        .info-date { font-size: 13px; color: rgba(255,255,255,0.7); font-weight: 500; }

        /* STATS */
        .stats-bar {
            max-width: 1100px; margin: 0 auto;
            padding: 20px 24px 0;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
        }
        .stats-title { font-size: 18px; font-weight: 800; color: #1e293b; }
        .stats-chips { display: flex; gap: 10px; }
        .stat-chip {
            display: flex; align-items: center; gap: 8px;
            background: #fff; border: 1.5px solid #e2e8f0; border-radius: 50px;
            padding: 8px 16px; font-size: 13px; font-weight: 600;
        }
        .stat-chip .dot { width: 8px; height: 8px; border-radius: 50%; }
        .stat-chip.total { color: #475569; }
        .stat-chip.total .dot { background: #94a3b8; }
        .stat-chip.hadir { color: #16a34a; }
        .stat-chip.hadir .dot { background: #22c55e; }
        .stat-chip.absen { color: #dc2626; }
        .stat-chip.absen .dot { background: #ef4444; }
        .stat-num { font-size: 16px; font-weight: 800; }

        /* TABLE AREA */
        .table-wrap{
            max-width:1100px;
            margin:16px auto 0;
            padding:0 16px;
            overflow-x:auto;
            overflow-y:hidden;
            -webkit-overflow-scrolling:touch;
            scrollbar-width:thin;
        }
        .table-card{
            background:#fff;
            border-radius:20px;
            box-shadow:0 2px 12px rgba(0,0,0,.06);
            overflow:visible;
        }
        table{
            width:100%;
            min-width:1100px;
            border-collapse:collapse;
        }
        thead tr { background: #0D1B6E; }
        thead th {
            padding: 14px 16px; text-align: center;
            font-size: 12px; font-weight: 700; color: #fff;
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        thead th:nth-child(4) { text-align: left; }
        tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.15s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f8fafc; }
        td {
            padding: 14px 16px; font-size: 13px;
            color: #374151; text-align: center; vertical-align: middle;
        }
        td.nama-col { text-align: left; font-weight: 600; color: #1e293b; }
        td.no-col { color: #94a3b8; font-weight: 600; width: 50px; }
        td.nis-col { font-family: monospace; font-size: 12px; color: #64748b; }

        /* RADIO BUTTONS */
        .radio-group { display: flex; gap: 6px; justify-content: center; }
        .radio-btn { position: relative; }
        .radio-btn input { position: absolute; opacity: 0; width: 0; height: 0; }
        .radio-btn label {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid #e2e8f0; background: #f8fafc;
            cursor: pointer; transition: all 0.2s;
        }
        .radio-btn label svg { pointer-events: none; }
        .radio-btn input:checked + label.hadir-lbl { background: #dcfce7; border-color: #22c55e; }
        .radio-btn input:checked + label.sakit-lbl { background: #fff7ed; border-color: #f97316; }
        .radio-btn input:checked + label.izin-lbl { background: #eff6ff; border-color: #3b82f6; }
        .radio-btn input:checked + label.alpa-lbl { background: #fef2f2; border-color: #ef4444; }
        .radio-btn label:hover { transform: scale(1.1); }

        /* KETERANGAN INPUT */
        .ket-input {
            width: 100%; min-width: 120px; padding: 8px 10px;
            border: 1.5px solid #e2e8f0; border-radius: 10px;
            font-size: 12px; font-family: inherit; font-weight: 500;
            color: #374151; background: #f8fafc; outline: none; transition: all 0.2s;
        }
        .ket-input:focus { border-color: #0D1B6E; background: #fff; }

        /* SKELETON */
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* BOTTOM BAR */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
            border-top: 1px solid #e2e8f0; padding: 16px 24px;
            z-index: 40;
        }
        .bottom-inner { max-width: 1100px; margin: 0 auto; }
        .btn-simpan {
            width: 100%; padding: 16px; background: #0D1B6E;
            color: #fff; border: none; border-radius: 14px;
            font-size: 15px; font-weight: 700; font-family: inherit;
            cursor: pointer; transition: all 0.2s; display: flex;
            align-items: center; justify-content: center; gap: 8px;
        }
        th,td{
            white-space:nowrap;
        }
        .btn-simpan:hover { background: #1a2d9e; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(13,27,110,0.3); }
        .btn-simpan:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        @media (max-width:700px){

        .topbar{
            padding:0 16px;
        }

        .table-scroll{
            overflow-x:auto;
            overflow-y:hidden;
            -webkit-overflow-scrolling:touch;
        }

        .table-scroll table{
            min-width:1100px;
        }
        .info-bar{
            padding:12px 16px;
        }

        .stats-bar{
            padding:16px 16px 0;
        }

        .table-wrap{
            padding:0 12px;
        }

        .info-chips{
            gap:8px;
        }

        thead th,
        td{
            padding:12px;
            font-size:13px;
            white-space:nowrap;
        }

    }
    </style>
</head>
<body>

    <div class="topbar">
        <button class="btn-back" onclick="window.location.href='dashboard.html'">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Kembali
        </button>
        <div class="profile-chip">
            <div class="profile-avatar" id="avatarTop">G</div>
            <div>
                <div class="profile-name" id="namaGuruTop">Guru</div>
                <div class="profile-role" id="mapelTop">-</div>
            </div>
            <svg width="14" height="14" fill="none" stroke="#94a3b8" stroke-width="2.5" viewBox="0 0 24 24" style="margin-left:6px"><path d="M6 9l6 6 6-6"/></svg>
        </div>
    </div>

    <div class="info-bar">
        <div class="info-chips">
            <div class="info-chip">
                <svg width="16" height="16" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
                <div>
                    <div class="info-chip-label">Kelas</div>
                    <div class="info-chip-value" id="labelKelas">-</div>
                </div>
            </div>
            <div class="info-chip">
                <svg width="16" height="16" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                <div>
                    <div class="info-chip-label">Mata Pelajaran</div>
                    <div class="info-chip-value" id="labelMapel">-</div>
                </div>
            </div>
        </div>
        <div class="info-date" id="labelTanggal">-</div>
    </div>

    <div class="stats-bar">
        <div class="stats-title">Daftar Siswa</div>
        <div class="stats-chips">
            <div class="stat-chip total"><div class="dot"></div>Total Siswa <span class="stat-num" id="statTotal">-</span></div>
            <div class="stat-chip hadir"><div class="dot"></div>Hadir <span class="stat-num" id="statHadir">0</span></div>
            <div class="stat-chip absen"><div class="dot"></div>Tidak Hadir <span class="stat-num" id="statAbsen">0</span></div>
        </div>
    </div>

    <div class="table-wrap">
        <div class="table-card">
            <div class="table-scroll"></div>
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>NIS</th>
                        <th>NISN</th>
                        <th style="text-align:left">Nama Siswa</th>
                        <th>Jenis Kelamin</th>
                        <th>Hadir</th>
                        <th>Sakit</th>
                        <th>Izin</th>
                        <th>Alpa</th>
                        <th>Ketrangan</th>
                    </tr>
                </thead>
                <tbody id="bodyTable">
                    <tr><td colspan="10" style="padding:40px;color:#94a3b8;font-weight:500">Memuat data siswa...</td></tr>
                </tbody>
            </table>
        </div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="bottom-inner">
            <button class="btn-simpan" id="btnSimpan" onclick="simpanAbsen()">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Sistem Rekap Kehadiran
            </button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyge3Is9gm24r_5nbXnkRlPEyJfOE42SkF1zPVjZTBOETVkotYsHAerjKigcUXJ0OM/exec";
        const kelas = localStorage.getItem('kelasAktif') || '-';
        const namaGuru = localStorage.getItem('namaGuru') || 'Guru';
        const mapel = localStorage.getItem('mapelAktif') || '-';

        document.getElementById('labelKelas').innerText = kelas;
        document.getElementById('labelMapel').innerText = mapel;
        document.getElementById('namaGuruTop').innerText = namaGuru;
        document.getElementById('mapelTop').innerText = mapel;
        document.getElementById('avatarTop').innerText = namaGuru.charAt(0).toUpperCase();
        document.getElementById('labelTanggal').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        let dataSiswaGlobal = [];

        function updateStats() {
            const total = dataSiswaGlobal.length;
            let hadir = 0;
            dataSiswaGlobal.forEach((_, i) => {
                const r = document.querySelector(`input[name="absen_${i}"]:checked`);
                if (r && r.value === 'H') hadir++;
            });
            document.getElementById('statTotal').innerText = total;
            document.getElementById('statHadir').innerText = hadir;
            document.getElementById('statAbsen').innerText = total - hadir;
        }

        async function muatSiswa() {
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getSiswa', kelas }) });
                const siswa = await res.json();
                dataSiswaGlobal = siswa.filter(r => r[2] && r[2] !== 'Nama Siswa');
                document.getElementById('statTotal').innerText = dataSiswaGlobal.length;
                document.getElementById('statHadir').innerText = dataSiswaGlobal.length;
                document.getElementById('statAbsen').innerText = 0;
                renderTable();
            } catch(e) {
                document.getElementById('bodyTable').innerHTML = `<tr><td colspan="10" style="padding:40px;color:#ef4444;font-weight:600">Gagal memuat data siswa. Periksa koneksi internet.</td></tr>`;
            }
        }

        function renderTable() {
            const tbody = document.getElementById('bodyTable');
            if (!dataSiswaGlobal.length) {
                tbody.innerHTML = `<tr><td colspan="10" style="padding:40px;color:#94a3b8">Tidak ada siswa di kelas ${kelas}</td></tr>`;
                return;
            }
            tbody.innerHTML = '';
            dataSiswaGlobal.forEach((s, i) => {
                const nis = s[0] || '-';
                const nisn = s[1] || '-';
                const nama = s[2] || '-';
                const lp = s[3] || '-';
                tbody.innerHTML += `
                <tr>
                    <td class="no-col">${i+1}</td>
                    <td class="nis-col">${nis}</td>
                    <td class="nis-col">${nisn}</td>
                    <td class="nama-col">${nama}</td>
                    <td>${lp}</td>
                    <td>
                        <div class="radio-group">
                            <div class="radio-btn">
                                <input type="radio" name="absen_${i}" id="h_${i}" value="H" checked onchange="updateStats()">
                                <label for="h_${i}" class="hadir-lbl" title="Hadir">
                                    <svg width="16" height="16" fill="none" stroke="#22c55e" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                                </label>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="radio-group">
                            <div class="radio-btn">
                                <input type="radio" name="absen_${i}" id="s_${i}" value="S" onchange="updateStats()">
                                <label for="s_${i}" class="sakit-lbl" title="Sakit">
                                    <svg width="16" height="16" fill="none" stroke="#f97316" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                </label>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="radio-group">
                            <div class="radio-btn">
                                <input type="radio" name="absen_${i}" id="iz_${i}" value="I" onchange="updateStats()">
                                <label for="iz_${i}" class="izin-lbl" title="Izin">
                                    <svg width="16" height="16" fill="none" stroke="#3b82f6" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                                </label>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="radio-group">
                            <div class="radio-btn">
                                <input type="radio" name="absen_${i}" id="a_${i}" value="A" onchange="updateStats()">
                                <label for="a_${i}" class="alpa-lbl" title="Alpa">
                                    <svg width="16" height="16" fill="none" stroke="#ef4444" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                </label>
                            </div>
                        </div>
                    </td>
                    <td><input type="text" class="ket-input" id="ket_${i}" placeholder="Tambah catatan..."></td>
                </tr>`;
            });
        }

        async function simpanAbsen() {
            const btn = document.getElementById('btnSimpan');
            btn.innerHTML = '⏳ Menyimpan data...';
            btn.disabled = true;
            let rekap = dataSiswaGlobal.map((s, i) => {
                const r = document.querySelector(`input[name="absen_${i}"]:checked`);
                return { nama: s[2], status: r ? r.value : 'H', rekapKeterangan: document.getElementById(`ket_${i}`).value || '-' };
            });
            try {
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'simpanAbsen', kelas, namaGuru, mapel, kehadiran: rekap }) });
                alert(`Absensi kelas ${kelas} — ${mapel} berhasil disimpan!`);
                window.location.href = 'dashboard.html';
            } catch(e) {
                alert('Gagal menyimpan! Coba lagi.');
                btn.innerHTML = '💾 Sistem Rekap Kehadiran';
                btn.disabled = false;
            }
        }

        muatSiswa();
    </script>
</body>
</html>
