<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Kehadiran</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f1f5f9;
            color: #1e293b
        }

        .topbar {
            height: 72px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px
        }

        .btn-back {
            padding: 10px 16px;
            border: none;
            border-radius: 12px;
            background: #0D1B6E;
            color: #fff;
            cursor: pointer
        }

        .profile {
            background: #f8fafc;
            padding: 10px 14px;
            border-radius: 14px
        }

        .info {
            background: #0D1B6E;
            color: #fff;
            padding: 28px
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .06);
            margin-bottom: 20px
        }

        .search {
            display: flex;
            gap: 12px
        }

        .search input {
            flex: 1;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px
        }

        .search button {
            padding: 14px 22px;
            background: #0D1B6E;
            color: #fff;
            border: none;
            border-radius: 12px
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px
        }

        .stat {
            background: #fff;
            border-radius: 20px;
            padding: 18px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .06)
        }

        .value {
            font-size: 28px;
            font-weight: 800
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        thead {
            background: #0D1B6E;
            color: #fff
        }

        th,
        td {
            padding: 12px;
            text-align: left
        }

        td {
            border-bottom: 1px solid #e2e8f0
        }

        .badge {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700
        }

        .h {
            background: #dcfce7;
            color: #166534
        }

        .s {
            background: #fef3c7;
            color: #92400e
        }

        .i {
            background: #dbeafe;
            color: #1d4ed8
        }

        .a {
            background: #fee2e2;
            color: #991b1b
        }

        @media(max-width:768px) {
            .stats {
                grid-template-columns: 1fr 1fr
            }

            .search {
                flex-direction: column
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div><button class="btn-back" onclick="location.href='dashboard.html'">← Kembali</button></div>
        <div class="profile"><strong id="namaGuru">Guru</strong></div>
    </div>

    <div class="info">
        <h2>Riwayat Kehadiran Siswa</h2>
        <p>Cari dan lihat seluruh riwayat absensi siswa</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="search">
                <input id="inputCari" placeholder="Masukkan NIS atau Nama Siswa">
                <button onclick="cariRiwayat()">Cari Data</button>
            </div>
        </div>

        <div class="card" id="biodata" style="display:none">
            <h3>Biodata Siswa</h3><br>
            <p><b>Nama:</b> <span id="nama"></span></p>
            <p><b>NIS:</b> <span id="nis"></span></p>
            <p><b>L/P:</b> <span id="lp"></span></p>
            <p><b>Kelas:</b> <span id="kelas"></span></p>
        </div>

        <div class="stats" id="stats" style="display:none">
            <div class="stat">
                <div class="value" id="total">0</div>Total
            </div>
            <div class="stat">
                <div class="value" id="hadir">0</div>Hadir
            </div>
            <div class="stat">
                <div class="value" id="sakit">0</div>Sakit
            </div>
            <div class="stat">
                <div class="value" id="izin">0</div>Izin
            </div>
            <div class="stat">
                <div class="value" id="alpa">0</div>Alpa
            </div>
        </div>

        <div class="card mt-20">
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Mapel</th>
                        <th>Status</th>
                        <th>Guru</th>
                        <th>Keterangan</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr>
                        <td colspan="5">Belum ada data.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyge3Is9gm24r_5nbXnkRlPEyJfOE42SkF1zPVjZTBOETVkotYsHAerjKigcUXJ0OM/exec";

        document.getElementById('namaGuru').textContent = localStorage.getItem('namaGuru') || 'Guru';

        function formatTanggal(tanggal){

            if(!tanggal) return '-';

            const d = new Date(tanggal);

            return d.toLocaleDateString('id-ID',{
                day:'2-digit',
                month:'long',
                year:'numeric'
            });

        }
        async function cariRiwayat() {
            const keyword = document.getElementById('inputCari').value.trim();
            if (!keyword) return alert('Masukkan nama atau NIS');

            const res = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getRiwayatSiswa', nama: keyword })
            });

            const data = await res.json();
            if (!data.length) { alert('Data tidak ditemukan'); return; }

            const s = data[0];

            document.getElementById('biodata').style.display = 'block';
            document.getElementById('stats').style.display = 'grid';

            nama.textContent = s.nama || '-';
            nis.textContent = s.nis || '-';
            lp.textContent = s.lp || '-';
            kelas.textContent = s.kelas || '-';

            let h = 0, sk = 0, i = 0, a = 0;

            tbody.innerHTML = '';

            data.forEach(r => {
                const st = (r.status || '').toUpperCase();

                if (st === 'H') h++;
                else if (st === 'S') sk++;
                else if (st === 'I') i++;
                else if (st === 'A') a++;

                let cls = 'h';
                if (st === 'S') cls = 's';
                if (st === 'I') cls = 'i';
                if (st === 'A') cls = 'a';

                tbody.innerHTML += `
<tr>
<td>${formatTanggal(r.tanggal)}</td>
<td>${r.mapel || '-'}</td>
<td><span class="badge ${cls}">${st}</span></td>
<td>${r.guru || '-'}</td>
<td>${r.keterangan || '-'}</td>
</tr>`;
            });

            total.textContent = data.length;
            hadir.textContent = h;
            sakit.textContent = sk;
            izin.textContent = i;
            alpa.textContent = a;
        }
    </script>
</body>

</html>
